<div id="root"><div class="boot">불러오는 중…</div></div>

<!-- 폰 저장소(IndexedDB) 헬퍼 -->
<script>
function idbOpen(){return new Promise(function(res,rej){var req=indexedDB.open("beetlelog-db",1);req.onupgradeneeded=function(){req.result.createObjectStore("kv");};req.onsuccess=function(){res(req.result);};req.onerror=function(){rej(req.error);};});}
async function idbGet(key){var db=await idbOpen();return new Promise(function(res,rej){var tx=db.transaction("kv","readonly").objectStore("kv").get(key);tx.onsuccess=function(){res(tx.result||null);};tx.onerror=function(){rej(tx.error);};});}
async function idbSet(key,val){var db=await idbOpen();return new Promise(function(res,rej){var tx=db.transaction("kv","readwrite").objectStore("kv").put(val,key);tx.onsuccess=function(){res(true);};tx.onerror=function(){rej(tx.error);};});}
var XLSX = window.XLSX;
</script>

<!-- ① 설정값 (종 리스트·브랜드 등) — 자주 수정 -->
